<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Appointments - Medicare</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Medicare</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="services.html" class="nav-link">Services</a>
        <a href="medicines.html" class="nav-link">Medicines</a>
        <a href="appointments.html" class="nav-link">Appointments</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link btn btn-primary">Contact</a>
      </nav>
    </div>
  </header>
  <main class="container" style="padding:32px 0">
    <h1>Book an Appointment</h1>
    <form class="card" onsubmit="event.preventDefault(); alert('Appointment request submitted!');">
      <div style="display:grid;gap:12px;grid-template-columns:1fr 1fr;max-width:640px">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Phone" required>
        <input type="date" required>
        <select required>
          <option value="">Select Department</option>
          <option>General</option>
          <option>Pediatrics</option>
          <option>Cardiology</option>
        </select>
        <select required>
          <option value="">Preferred Time</option>
          <option>Morning</option>
          <option>Afternoon</option>
          <option>Evening</option>
        </select>
        <textarea placeholder="Notes" style="grid-column:1/-1" rows="4"></textarea>
      </div>
      <div style="margin-top:12px">
        <button class="btn btn-primary" type="submit">Submit</button>
      </div>
    </form>
  </main>
  <footer class="site-footer"><div class="container footer-inner"><p>© <span id="year"></span> Medicare</p></div></footer>
  <button id="chatbot-fab" aria-label="Open chat">💬</button>
  <div id="chatbot" aria-live="polite" aria-hidden="true">
    <div class="chat-header">
      <img src="assets/chatbot-logo.svg" alt="Chatbot logo" class="chat-logo">
      <span>Medicare Assistant</span>
      <button id="chatbot-close" class="chat-close" aria-label="Close chat">✕</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <form id="chat-form" class="chat-input" autocomplete="off">
      <input id="chat-text" type="text" placeholder="Type your message..." aria-label="Message">
      <button type="submit" class="btn btn-primary">Send</button>
    </form>
  </div>
  <script src="chatbot.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
